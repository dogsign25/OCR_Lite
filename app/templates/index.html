<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PDF OCR Converter</title>
  <link rel="icon" href="{{ url_for('static', path='/favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
  <main class="container">
    <section class="hero">
      <span class="eyebrow">LOCAL PDF TOOL</span>
      <h1>Turn PDFs into searchable documents.</h1>
      <p>Upload PDFs, filter pages, correct OCR text, and download searchable PDFs with verified JSON results.</p>
    </section>

    <section class="card">
      <form id="upload-form">
        <label class="drop-zone" id="drop-zone" for="pdf-files">
          <input id="pdf-files" name="files" type="file" accept=".pdf,application/pdf" multiple required>
          <span class="upload-icon">PDF</span>
          <strong>Choose PDF files</strong>
          <span>or drag and drop them here</span>
          <small>Maximum 50 MB per file</small>
        </label>

        <div id="file-list" class="file-list" aria-live="polite"></div>
        <label class="filter-field" for="filter-words">
          <strong>Include words (optional)</strong>
          <textarea
            id="filter-words"
            name="filter_words"
            rows="3"
            placeholder="invoice, approved&#10;Separate words with commas or new lines"
          ></textarea>
        </label>
        <label class="filter-field" for="filter-mode">
          <strong>Include condition</strong>
          <select id="filter-mode" name="filter_mode">
            <option value="any">OR - keep pages containing any word</option>
            <option value="all">AND - keep pages containing every word</option>
          </select>
        </label>
        <label class="filter-field" for="exclude-words">
          <strong>Exclude words (optional)</strong>
          <textarea
            id="exclude-words"
            name="exclude_words"
            rows="3"
            placeholder="draft, confidential&#10;Pages containing any excluded word are removed"
          ></textarea>
          <small>Exclude words take priority over the include condition.</small>
        </label>
        <div class="preset-panel">
          <label for="filter-preset">
            <strong>Saved filter preset</strong>
            <select id="filter-preset">
              <option value="">Choose a saved preset</option>
            </select>
          </label>
          <label for="preset-name">
            <strong>Preset name</strong>
            <input id="preset-name" type="text" maxlength="80" placeholder="Monthly invoices">
          </label>
          <div class="preset-actions">
            <button id="save-preset" class="secondary-button" type="button">Save current filter</button>
            <button id="delete-preset" class="danger-button" type="button">Delete preset</button>
          </div>
          <p id="preset-status" class="inline-status" aria-live="polite"></p>
        </div>
        <button id="submit-button" type="submit">Convert and run OCR</button>

        <div id="progress-wrap" class="progress-wrap hidden">
          <div class="progress-track"><div id="progress-bar" class="progress-bar"></div></div>
          <p id="status-message">Uploading files...</p>
        </div>
      </form>
    </section>

    <section id="results" class="results hidden" aria-live="polite">
      <div class="section-heading">
        <span class="eyebrow">OUTPUTS</span>
        <h2>Processing results</h2>
      </div>
      <div id="result-list"></div>
    </section>
  </main>

  <script src="{{ url_for('static', path='/script.js') }}"></script>
</body>
</html>
